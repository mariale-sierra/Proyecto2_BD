version: '3.8'

services:
  
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: proy2
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tienda
    ports:
      - "5432:5432"
  volumes:
    - ./db/init:/docker-entrypoint-initdb.d
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

